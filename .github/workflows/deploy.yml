name: Deploy to production (SSH)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deploy package
        run: |
          mkdir -p dist
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.vscode' \
            --exclude='.claude' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='backup-*' \
            --exclude='bin' \
            --exclude='dist' \
            --exclude='*.log' \
            --exclude='*.zip' \
            --exclude='*.md' \
            --exclude='desktop.ini' \
            --exclude='phpunit.xml' \
            --exclude='composer.lock' \
            --exclude='commit-phase1.sh' \
            --exclude='check-timezone.php' \
            --exclude='test-create-event.php' \
            ./ dist/

      - name: Debug key (temporary, no key material printed)
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          printf '%s' "$SSH_KEY" | wc -c
          printf '%s' "$SSH_KEY" | sha256sum
          printf '%s' "$SSH_KEY" | head -n1 | cat -A | head -c 80
          echo
          printf '%s' "$SSH_KEY" | tail -n1 | cat -A | head -c 80
          echo

      - name: Deploy via SSH
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/home/u319690172/domains/ikomiris.com/public_html/wp-content/plugins/ikomiris-booking-system"
          strip_components: 1
          overwrite: true
